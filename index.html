<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="YournextCISO — Be DFIRent. SOC Analyst | Blue Team & DFIR">
  <title>YournextCISO — Home</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><text y='28' font-size='28'>🛡️</text></svg>">
</head>
<body>

  <!-- Starfield Background -->
  <canvas id="starfield" aria-hidden="true"></canvas>

  <!-- Skip Link -->
  <a href="#main-content" class="sr-only skip-link">Skip to content</a>

  <!-- Header / Navigation -->
  <header class="site-header">
    <div class="header-inner">
      <a href="/" class="brand" title="YournextCISO">
        <img src="images/avatar.png" alt="" class="brand-avatar" width="32" height="32" onerror="this.style.display='none'">
        <span>yournextciso</span>
      </a>
      <button class="nav-toggle" id="navToggle" aria-label="Toggle navigation" aria-expanded="false">☰</button>
      <nav>
        <ul class="nav-tabs" id="navTabs">
          <li><a href="/" class="nav-tab"><span class="ix">↗</span>Home</a></li>
          <li><a href="blogs/" class="nav-tab"><span class="ix">↗</span>Blog</a></li>
          <li><a href="dfiring/" class="nav-tab"><span class="ix">↗</span>DFIRing</a></li>
          <li><a href="whoami/" class="nav-tab"><span class="ix">↗</span>whoami</a></li>
          <li><a href="resources/" class="nav-tab"><span class="ix">↗</span>Resources</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <!-- Main Content -->
  <main id="main-content">

    <!-- Operator Profile — Minimal -->
    <section class="profile-hero">
      <img src="images/avatar.png" alt="YournextCISO profile" class="profile-avatar" width="120" height="120" onerror="this.style.display='none'">
      <h1 class="profile-name">YournextCISO</h1>
      <p class="profile-title">SOC Analyst &bull; Blue Team &bull; DFIR</p>
    </section>

    <div class="container">

      <!-- Recent Blog Posts — Combined Feed (Medium + Obsidian) -->
      <section class="section" id="blog-feed">
        <div class="section-header">
          <span class="indicator" aria-hidden="true"></span>
          <h2>Recent Blog Posts</h2>
        </div>

        <div data-combined-feed="3">
          <!-- Dynamically populated from medium-posts.json + obsidian-posts.json -->
          <p style="color:var(--soc-ink0);">Loading posts…</p>
        </div>

        <p style="text-align:right;margin-top:0.5rem;">
          <a href="blogs/">View all posts →</a>
        </p>
      </section>

    </div>
  </main>

  <!-- Footer -->
  <footer class="site-footer">
    <div class="container">
      <p>
        <span class="status-dot" aria-hidden="true"></span>
        OPERATIONAL STATUS: ONLINE &mdash; Uptime <span id="uptimeCounter">--:--:--</span>
      </p>
      <p style="margin-top:0.5rem;">
        &copy; <span id="currentYear">2026</span> YournextCISO &mdash;
        <a href="https://github.com/YournextCISO">GitHub</a> &middot;
        <a href="https://x.com/YournextCISO">@YournextCISO</a> &middot;
        <a href="https://www.linkedin.com/in/ndesylvarius/">LinkedIn</a>
      </p>
    </div>
  </footer>

  <script src="js/main.js"></script>
  <script src="js/starfield.js"></script>
  <script src="js/combined-feed.js"></script>
</body>
</html>

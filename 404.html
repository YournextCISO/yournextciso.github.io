<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — ENDPOINT NOT FOUND | YournextCISO</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><text y='28' font-size='28'>🛡️</text></svg>">
</head>
<body>

  <a href="#main-content" class="sr-only skip-link">Skip to content</a>

  <header class="site-header">
    <div class="header-inner">
      <a href="/" class="brand" title="YournextCISO">
        <span>yournextciso</span>
      </a>
    </div>
  </header>

  <main id="main-content">
    <div class="container error-page">
      <h1>404</h1>
      <p style="font-family:var(--font-mono);color:var(--soc-red);font-size:1.1rem;">[!] ENDPOINT NOT FOUND</p>
      <p style="margin-top:1rem;color:var(--soc-ink0);">The resource you requested does not exist or has been relocated.</p>
      <p style="margin-top:1rem;">
        <a href="/" class="nav-tab" style="display:inline-block;"><span class="ix">↗</span>Return to Home</a>
      </p>
    </div>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p><span class="status-dot" aria-hidden="true"></span> OPERATIONAL STATUS: ONLINE</p>
      <p style="margin-top:0.5rem;">
        &copy; <span id="currentYear">2026</span> YournextCISO &mdash;
        <a href="https://x.com/yournextciso">@yournextciso</a>
      </p>
    </div>
  </footer>

  <script>
    document.getElementById('currentYear').textContent = new Date().getFullYear();
  </script>
</body>
</html>
